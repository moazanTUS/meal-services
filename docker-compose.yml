version: "2.2"

services:
  nutrition-service:
    build: ./nutrition-service
    ports:
      - "8081:8080"
    environment:
      - SERVER_PORT=8080

  mealplan-service:
    build: ./meal-plan-service
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - NUTRITIONSERVICE_SERVICE_URL=http://nutrition-service:8080
    depends_on:
      - nutrition-service
