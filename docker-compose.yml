version: "2.2"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword" ]
      interval: 10s
      timeout: 5s
      retries: 10
  nutrition-service:
    build: ./nutrition-service
    ports:
      - "8081:8080"
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      mysql:
        condition: service_healthy

  mealplan-service:
    build: ./meal-plan-service
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - NUTRITIONSERVICE_SERVICE_URL=http://nutrition-service:8080
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      mysql:
        condition: service_healthy
      nutrition-service:
        condition: service_started

volumes:
  mysql-data:
