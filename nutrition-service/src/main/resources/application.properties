spring.application.name=nutrition-service

server.port=8080

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# defer execution of data.sql until DB gets created
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# If SERVER_PORT is set, use it. Otherwise use 8081
# So it will work locally and in Docker
# SERVER_PORT is set by Docker when running the container
server.port=${SERVER_PORT:8081}
